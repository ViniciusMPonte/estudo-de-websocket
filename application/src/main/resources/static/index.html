<!DOCTYPE html>
<html>
<head>
    <title>Teste STOMP</title>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
</head>
<body>
<h2>Teste WebSocket STOMP</h2>

<input id="apelido" placeholder="Apelido" />
<input id="chave" placeholder="Chave da sala" />
<button onclick="conectar()">Conectar</button>
<button onclick="entrar()">Entrar na sala</button>
<button onclick="enviarLocalizacao()">Enviar Localização</button>
<button onclick="sair()">Sair da sala</button>

<pre id="log"></pre>

<script>
    var stompClient;
    var meuUuid = gerarUuid();

    function gerarUuid() {
        return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
            var r = Math.random() * 16 | 0;
            return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
        });
    }

    function log(msg) {
        document.getElementById('log').textContent += msg + '\n';
    }

    function getChave() {
        return document.getElementById('chave').value;
    }

    function getApelido() {
        return document.getElementById('apelido').value;
    }

    function conectar() {
        var socket = new SockJS('http://localhost:8080/chat');
        stompClient = Stomp.over(socket);
        stompClient.connect({}, function(frame) {
            log('Conectado | uuid: ' + meuUuid);
        });
    }

    function entrar() {
        var chave = getChave();

        // tópico da sala: eventos (ENTROU, SAIU)
        stompClient.subscribe('/topic/sala/' + chave, function(msg) {
            log('[sala] ' + msg.body);
        });

        // tópico pessoal: localizações recebidas
        stompClient.subscribe('/topic/sala/' + chave + '/' + meuUuid, function(msg) {
            log('[pessoal] ' + msg.body);
        });

        var payload = JSON.stringify({ chave: chave, apelido: getApelido(), uuid: meuUuid });
        stompClient.send('/app/entrar', {}, payload);
        log('Entrou na sala: ' + chave + ' como ' + getApelido());
    }

    function enviarLocalizacao() {
        var payload = JSON.stringify({
            chave: getChave(),
            latitude: -23.5505,
            longitude: -46.6333
        });
        stompClient.send('/app/localizacao', {}, payload);
        log('Localização enviada');
    }

    function sair() {
        var chave = getChave();
        var payload = JSON.stringify({ chave: chave });
        stompClient.send('/app/sair', {}, payload);
        log('Saiu da sala: ' + chave);
    }
</script>
</body>
</html>
